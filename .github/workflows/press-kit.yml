name: Press Kit

on:
  workflow_dispatch:

jobs:
  build-press-kit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run print:manifesto

      - uses: actions/upload-artifact@v4
        with:
          name: praxeos-press-kit
          path: public/press
