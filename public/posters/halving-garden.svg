<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The Halving Garden poster</title>
  <desc id="desc">A botanical manuscript of Bitcoin blocks arranged in five vertical panels.</desc>
  <defs>
    <linearGradient id="paper" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f0e6" />
      <stop offset="100%" stop-color="#ede6d6" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#paper)" />
  <g stroke="#d8cfbe" stroke-width="2">
    <line x1="320" x2="320" y1="72" y2="860" />
    <line x1="640" x2="640" y1="72" y2="860" />
    <line x1="960" x2="960" y1="72" y2="860" />
    <line x1="1280" x2="1280" y1="72" y2="860" />
