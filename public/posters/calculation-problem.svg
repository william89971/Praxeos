<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The Calculation Problem poster</title>
  <desc id="desc">Two panels of typographic agents showing market coordination and planned disorder.</desc>
  <rect width="1600" height="900" fill="#f5f0e6" />
  <line x1="800" x2="800" y1="120" y2="780" stroke="#d8cfbe" stroke-width="2" />
  <text x="100" y="160" fill="#8b8275" font-family="JetBrains Mono, monospace" font-size="24" letter-spacing="6">MARKET</text>
  <text x="900" y="160" fill="#8b8275" font-family="JetBrains Mono, monospace" font-size="24" letter-spacing="6">PLANNED</text>
  <g fill="#1c1814" font-family="Georgia, serif">
    <text x="146" y="240" font-size="42">c</text>
    <text x="232" y="310" font-size="54">p</text>
    <text x="344" y="232" font-size="34">g</text>
    <text x="454" y="350" font-size="62">r</text>
    <text x="580" y="276" font-size="44">c</text>
    <text x="646" y="402" font-size="56">p</text>
    <text x="186" y="442" font-size="38">g</text>
    <text x="312" y="536" font-size="60">r</text>
    <text x="470" y="488" font-size="52">c</text>
    <text x="628" y="596" font-size="46">p</text>
  </g>
  <g fill="#8b3a3a" font-family="Georgia, serif">
    <text x="960" y="232" font-size="50" transform="rotate(-8 960 232)">c</text>
    <text x="1086" y="292" font-size="66" transform="rotate(12 1086 292)">p</text>
    <text x="1220" y="216" font-size="38" transform="rotate(-10 1220 216)">g</text>
    <text x="1330" y="360" font-size="74" transform="rotate(10 1330 360)">r</text>
    <text x="1470" y="284" font-size="54" transform="rotate(-12 1470 284)">c</text>
    <text x="1018" y="460" font-size="46" transform="rotate(14 1018 460)">g</text>
    <text x="1166" y="560" font-size="70" transform="rotate(-9 1166 560)">r</text>
    <text x="1318" y="490" font-size="58" transform="rotate(11 1318 490)">c</text>
    <text x="1442" y="618" font-size="52" transform="rotate(-14 1442 618)">p</text>
  </g>
  <g stroke="#8b8275" stroke-width="1.6" opacity="0.55">
    <line x1="146" x2="232" y1="240" y2="310" />
    <line x1="232" x2="344" y1="310" y2="232" />
    <line x1="344" x2="454" y1="232" y2="350" />
    <line x1="454" x2="580" y1="350" y2="276" />
    <line x1="580" x2="646" y1="276" y2="402" />
    <line x1="186" x2="312" y1="442" y2="536" />
    <line x1="312" x2="470" y1="536" y2="488" />
    <line x1="470" x2="628" y1="488" y2="596" />
  </g>
  <text x="80" y="844" fill="#1c1814" font-family="Georgia, serif" font-size="72">The Calculation Problem</text>
  <text x="80" y="880" fill="#5c5348" font-family="Georgia, serif" font-size="28" font-style="italic">
    Two economies, one with prices and one without
  </text>
</svg>
